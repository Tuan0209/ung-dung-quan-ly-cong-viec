{% extends 'base.html' %}

{% block title %}Sửa danh mục{% endblock %}
{% block page_title %}Sửa danh mục{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card-custom">
            <form method="post" novalidate>
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Tên danh mục <span class="text-danger">*</span></label>
                    {{ form.name }}
                    {% for e in form.name.errors %}<div class="text-danger small mt-1">{{ e }}</div>{% endfor %}
                </div>
                <div class="mb-3">
                    <label class="form-label">Màu sắc</label>
                    {{ form.color }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Mô tả</label>
                    {{ form.description }}
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Lưu</button>
                    <a href="{% url 'tasks:category_list' %}" class="btn btn-outline-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
